# Added binhost for first time, update with `getuto`
[gentoo-x86-64]
priority = 9959
# NOTE: adjust amd64 and x86-64 as appropriate
sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/
verify-signature = true
location = /var/cache/binhost/gentoo-x86-64

# x86-64 v3 may not have a bin package, fallback to normal
[gentoo-x86-64-v3]
priority = 9999
sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64-v3/
verify-signature = true
location = /var/cache/binhost/gentoo-x86-64-v3